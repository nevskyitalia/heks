name: CI

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'apk/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate platform files
        run: |
          flutter create . --org rs.heks --project-name heks --platforms android
          rm -f test/widget_test.dart

      - name: Dependencies
        run: flutter pub get

      - name: Tests
        run: flutter test

      - name: Build
        run: |
          flutter build apk --release
          flutter build apk --release --split-per-abi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: output
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Commit outputs
        run: |
          mkdir -p apk
          cp build/app/outputs/flutter-apk/app-release.apk apk/heks.apk
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk apk/heks-arm64.apk
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apk/
          git commit -m "ci output [skip ci]" || echo "no changes"
          git push
